<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Org & Aura | Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700&family=Open+Sans:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="glass">
      <div class="nav-wrap">
        <div class="brand">
          <img src="WhatsApp Image 2026-04-26 at 3.11.47 PM.jpeg" alt="Org and Aura logo" />
          <div>
            <h1>Org & Aura</h1>
            <span>Admin Upload Panel</span>
          </div>
        </div>
        <nav>
          <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="gallery.html">Gallery</a></li>
            <li><a href="blog.html">Blog</a></li>
          </ul>
        </nav>
      </div>
    </header>

    <main>
      <section class="page-hero">
        <div class="container">
          <h2 class="section-title">Admin Controls</h2>
          <p class="section-copy">
            This page is for manager/admin uploads. Share only with trusted users.
          </p>
          <article class="panel glass">
            <h3>Admin Password</h3>
            <input id="adminPassword" type="password" placeholder="Enter admin password" />
          </article>

          <article class="panel glass">
            <h3>Upload Gallery Images</h3>
            <form id="adminGalleryForm">
              <input id="adminGalleryImages" type="file" accept="image/*" multiple required />
              <button class="btn btn-primary" type="submit">Upload to Gallery</button>
            </form>
          </article>

          <article class="panel glass">
            <h3>Create Blog Post</h3>
            <form id="adminBlogForm">
              <input id="adminBlogTitle" type="text" placeholder="Blog title" required />
              <input id="adminBlogDate" type="date" required />
              <textarea id="adminBlogContent" placeholder="Blog content" required></textarea>
              <input id="adminBlogImage" type="file" accept="image/*" />
              <button class="btn btn-primary" type="submit">Publish Blog</button>
            </form>
          </article>

          <article class="panel glass">
            <p id="adminStatus">Status: Ready</p>
          </article>
        </div>
      </section>
    </main>

    <footer>
      <div class="container">
        <p>© 2026 Org & Aura Private Limited. All rights reserved.</p>
      </div>
    </footer>
    <script src="site.js"></script>
  </body>
</html>
